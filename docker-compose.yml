version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: heart-backend
    ports:
      - "5000:5000"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      MONGO_URI: ${MONGO_URI}
      ENVIRONMENT: development
      FLASK_ENV: development
      PORT: 5000
    env_file:
      - back/.env
    volumes:
      - ./back:/app/back
    restart: unless-stopped
    command: gunicorn -w 4 -b 0.0.0.0:5000 app:app --reload --timeout 120
    networks:
      - heart-network

networks:
  heart-network:
    driver: bridge
